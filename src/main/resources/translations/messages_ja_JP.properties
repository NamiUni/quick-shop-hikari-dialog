# -----------------------------------------------------------------------------
# Shop creation - success / failure
# -----------------------------------------------------------------------------

# デフォルトでは QuickShop の "success-created-shop" 翻訳を使用します。
# MiniMessage 構文で独自のメッセージを記述することもできます。
qsh_dialog.shop.creation.success=<quickshop:success-created-shop> <gray>(Cost: <total_cost_formatted>)
qsh_dialog.shop.creation.failure.insufficient_funds=<jis_red>ショップの作成に失敗しました。作成には <total_cost_formatted> が必要です。
qsh_dialog.shop.creation.failure.price_out_of_range=<jis_red>ショップの作成に失敗しました。価格は <item:min_price> ～ <item:max_price> の範囲で設定してください。
qsh_dialog.shop.creation.failure.container_not_found=<jis_red>ショップの作成に失敗しました。対象の場所にコンテナが見つかりませんでした。
qsh_dialog.shop.creation.failure.price_empty=<jis_red>ショップの作成に失敗しました。価格を入力してください。
qsh_dialog.shop.creation.failure.price_invalid=<jis_red>ショップの作成に失敗しました。"<input>" は有効な価格ではありません。

# -----------------------------------------------------------------------------
# Shop modification - success / failure
# -----------------------------------------------------------------------------

qsh_dialog.shop.modification.success=<jis_green>ショップの設定を更新しました。 <gray>(Cost: <total_cost_formatted>)
qsh_dialog.shop.modification.failure.insufficient_funds=<jis_red>ショップの編集に失敗しました。変更を適用するには <total_cost_formatted> が必要です。
qsh_dialog.shop.modification.failure.price_out_of_range=<jis_red>ショップの編集に失敗しました。価格は <price:'<shop_product_key>':min> ～ <price:'<shop_product_key>':max> の範囲で設定してください。
qsh_dialog.shop.modification.failure.shop_not_found=<jis_red>ショップの編集に失敗しました。対象のショップが見つかりませんでした。
qsh_dialog.shop.modification.failure.price_empty=<jis_red>ショップの編集に失敗しました。価格を入力してください。
qsh_dialog.shop.modification.failure.price_invalid=<jis_red>ショップの編集に失敗しました。"<input>" は有効な価格ではありません。

# -----------------------------------------------------------------------------
# 取引エラー
#
# <quickshop_message> は対応する QuickShop の翻訳をそのまま表示します
# (在庫数、価格、アイテム名などの動的な値を含む)。
# <quickshop_message> を独自の MiniMessage テキストに置き換えることもできます。
#
# <quickshop:key> で引数なしの QuickShop メッセージを参照できます。
# <quickshop:key:arg0:arg1> の形式で引数を渡すことができます。
# 各引数は MiniMessage としてパースされるため、他のタグを使用できます:
#   <quickshop:you-cant-afford-shop-naming:<naming_cost>>
# -----------------------------------------------------------------------------

qsh_dialog.trade.error.shop_unavailable=<quickshop:shop-cannot-trade-when-freezing>
qsh_dialog.trade.error.shop_out_of_stock=<quickshop:shop-stock-too-low:'<shop_stock>':'<shop_product_display_name>'>
qsh_dialog.trade.error.shop_inventory_full=<quickshop:shop-has-no-space:'<shop_space>':'<shop_product_display_name>'>
qsh_dialog.trade.error.shop_insufficient_funds=<quickshop:the-owner-cant-afford-to-buy-from-you:'<shop_price_formatted>':'<shop_owner_balance_formatted>'>
qsh_dialog.trade.error.customer_inventory_full=<quickshop:not-enough-space:'<shop_space>'>
qsh_dialog.trade.error.customer_insufficient_funds=<quickshop:you-cant-afford-to-buy:'<shop_price_formatted>':'<user_balance_formatted>'>
qsh_dialog.trade.error.customer_insufficient_items=<quickshop:you-dont-have-that-many-items:0:'<shop_product_display_name>'>
qsh_dialog.trade.error.customer_insufficient_funds_for_naming=<quickshop:you-cant-afford-shop-naming:'<naming_cost_formatted>'>