# -----------------------------------------------------------------------------

qsh_dialog.dialog.input.shop.name=Shop Name (Cost: <naming_cost_formatted>)
qsh_dialog.dialog.input.shop.trade_type=Trade Type
qsh_dialog.dialog.input.shop.available=Available
qsh_dialog.dialog.input.shop.display_visible=Display Item
qsh_dialog.dialog.input.shop.currency=Currency
qsh_dialog.dialog.input.shop.infinite_stock=Infinite Stock
qsh_dialog.dialog.input.product.price=Price (Range: <price:'<shop_product_key>':min> - <price:'<shop_product_key>':max>)
qsh_dialog.dialog.input.product.quantity=Units per Transaction
qsh_dialog.dialog.input.product.quantity.format=%s: %s items
qsh_dialog.dialog.input.trade.quantity=Quantity
