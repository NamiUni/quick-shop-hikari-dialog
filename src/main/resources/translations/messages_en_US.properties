qsh_dialog.dialog.shop.creation.title=Shop Creation
qsh_dialog.dialog.shop.modification.title=Shop Modification
qsh_dialog.dialog.trade.purchase.title=<head:<shop_owner_name>> <shop_name_or_default>
qsh_dialog.dialog.trade.sell.title=<head:<shop_owner_name>> <shop_name_or_default>

# -----------------------------------------------------------------------------
# Dialog descriptions
# -----------------------------------------------------------------------------

qsh_dialog.dialog.shop.creation.description=Configure your new shop below, then click <b><jis_green>Create</jis_green></b> to finish. (Cost: <create_cost_formatted>)
qsh_dialog.dialog.shop.modification.description=Adjust your shop settings below, then click <b><jis_green>Apply</jis_green></b> to finish.
qsh_dialog.dialog.trade.purchase.description=Enter the quantity, then click <b><jis_green>Buy</jis_green></b> to complete your purchase.
qsh_dialog.dialog.trade.sell.description=Enter the quantity, then click <b><jis_green>Sell</jis_green></b> to complete your sale.

