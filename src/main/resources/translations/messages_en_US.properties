qsh_dialog.dialog.button.create=Create
qsh_dialog.dialog.button.apply=Apply
qsh_dialog.dialog.button.buy=Buy
qsh_dialog.dialog.button.sell=Sell
qsh_dialog.dialog.button.cancel=Cancel

# -----------------------------------------------------------------------------
# Shop creation - success / failure
# -----------------------------------------------------------------------------

# Uses QuickShop's "success-created-shop" translation by default.
# You can write your own message here using MiniMessage syntax.
qsh_dialog.shop.creation.success=<quickshop:success-created-shop> <gray>(Cost: <total_cost_formatted>)</gray>\n<green>You placed <user_shops>/<user_shops_limit> shops.
qsh_dialog.shop.creation.failure.insufficient_funds=<jis_red>Shop creation failed. You need <total_cost_formatted> to create this shop.
qsh_dialog.shop.creation.failure.price_out_of_range=<jis_red>Shop creation failed. The price must be between <price:'<shop_product_key>':min> and <price:'<shop_product_key>':max>.
qsh_dialog.shop.creation.failure.container_not_found=<jis_red>Shop creation failed. No container was found at the target location.
qsh_dialog.shop.creation.failure.price_empty=<jis_red>Shop creation failed. A price is required.
qsh_dialog.shop.creation.failure.limit_reached=<jis_red>You have reached your shop limit and cannot create any more shops.
qsh_dialog.shop.creation.failure.price_invalid=<jis_red>Shop creation failed. "<input>" is not a valid price.

# -----------------------------------------------------------------------------
# Shop modification - success / failure
# -----------------------------------------------------------------------------

qsh_dialog.shop.modification.success=<jis_green>Your shop has been updated successfully. <gray>(Cost: <total_cost_formatted>)
qsh_dialog.shop.modification.failure.insufficient_funds=<jis_red>Shop modification failed. You need <total_cost_formatted> to apply this change.
qsh_dialog.shop.modification.failure.price_out_of_range=<jis_red>Shop modification failed. The price must be between <price:'<shop_product_key>':min> and <price:'<shop_product_key>':max>.
qsh_dialog.shop.modification.failure.shop_not_found=<jis_red>Shop modification failed. The shop could not be found.
qsh_dialog.shop.modification.failure.price_empty=<jis_red>Shop modification failed. A price is required.
qsh_dialog.shop.modification.failure.price_invalid=<jis_red>Shop modification failed. "<input>" is not a valid price.

# -----------------------------------------------------------------------------
# Trade errors
#
# <quickshop_message> renders the corresponding QuickShop translation directly,
# including any dynamic values (stock count, price, item name, etc.).
# You can replace <quickshop_message> with your own MiniMessage text.
#
# <quickshop:key> references a no-arg QuickShop message.
# <quickshop:key:arg0:arg1> passes arguments to a QuickShop message.
# Each argument is parsed as MiniMessage, so other tags can be used:
#   <quickshop:you-cant-afford-shop-naming:<naming_cost>>
# -----------------------------------------------------------------------------

qsh_dialog.trade.error.shop_unavailable=<quickshop:shop-cannot-trade-when-freezing>
qsh_dialog.trade.error.shop_out_of_stock=<quickshop:shop-stock-too-low:'<shop_stock>':'<shop_product_display_name>'>
qsh_dialog.trade.error.shop_inventory_full=<quickshop:shop-has-no-space:'<shop_space>':'<shop_product_display_name>'>
qsh_dialog.trade.error.shop_insufficient_funds=<quickshop:the-owner-cant-afford-to-buy-from-you:'<shop_price_formatted>':'<shop_owner_balance_formatted>'>
qsh_dialog.trade.error.customer_inventory_full=<quickshop:not-enough-space:'<shop_space>'>
qsh_dialog.trade.error.customer_insufficient_funds=<quickshop:you-cant-afford-to-buy:'<shop_price_formatted>':'<user_balance_formatted>'>
qsh_dialog.trade.error.customer_insufficient_items=<quickshop:you-dont-have-that-many-items:0:'<shop_product_display_name>'>
qsh_dialog.trade.error.customer_insufficient_funds_for_naming=<quickshop:you-cant-afford-shop-naming:'<naming_cost_formatted>'>